
server:
  port: 8080

spring:
  application:
    name: space
  datasource:
    url: jdbc:postgresql://localhost:5432/space_mission_control
    username: space_admin
    password: space_password
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /docs